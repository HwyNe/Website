<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <title>PitoCtf Writeups</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }
        
        body {
            font-family: Inter, system-ui, sans-serif;
            background: #f6f1e7;
            color: #2e2a25;
        }
        
        .header {
            background: #fbf7f0;
            border-bottom: 1px solid #e5dccb;
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
        }
        
        .header-content {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo h1 {
            color: #7c5c3e
        }
        
        .logo p {
            font-size: .8rem;
            color: #8b7a63
        }
        
        .btn {
            padding: .45rem .9rem;
            border-radius: 8px;
            border: 1px solid #e5dccb;
            background: #fffaf3;
            text-decoration: none;
            color: #2e2a25;
            cursor: pointer;
        }
        
        .container {
            max-width: 1200px;
            margin: auto;
            padding: 2rem;
        }
        
        .search-box input {
            width: 100%;
            padding: .75rem;
            border-radius: 10px;
            border: 1px solid #e5dccb;
            background: #fffaf3;
        }
        
        .filter-buttons {
            margin-top: 1rem;
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: .4rem .9rem;
            border-radius: 999px;
            border: 1px solid #e5dccb;
            background: #fffaf3;
            cursor: pointer;
        }
        
        .filter-btn.active {
            background: #7c5c3e;
            color: #fffaf3;
        }
        
        .stats {
            margin: 2rem 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
        }
        
        .stat-card {
            background: #fffaf3;
            border: 1px solid #e5dccb;
            border-radius: 16px;
            padding: 1.25rem;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #7c5c3e;
        }
        
        .writeups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.25rem;
        }
        
        .writeup-card {
            background: #fffaf3;
            border: 1px solid #e5dccb;
            border-radius: 16px;
            padding: 1.25rem;
            cursor: pointer;
        }
        
        .writeup-card:hover {
            border-color: #7c5c3e;
            transform: translateY(-4px);
        }
        
        .category-badge {
            font-size: .7rem;
            padding: .2rem .6rem;
            border-radius: 999px;
            background: #efe4d3;
            color: #7c5c3e;
        }
        
        .detail-view {
            display: none;
        }
        
        .detail-view.active {
            display: block;
        }
        
        .detail-article {
            background: #fffaf3;
            border: 1px solid #e5dccb;
            border-radius: 16px;
            padding: 2rem;
        }
        
        pre {
            background: #f6f1e7;
            padding: 1rem;
            border-radius: 10px;
            overflow-x: auto;
        }
        
        .footer {
            margin-top: 4rem;
            padding: 2rem;
            text-align: center;
            color: #8b7a63;
            border-top: 1px solid #e5dccb;
        }
    </style>
</head>

<body>

    <header class="header">
        <div class="header-content">
            <div class="logo">
                <h1>PitoCtf Writeups</h1>
                <p>Siber Güvenlik Çözüm Notları</p>
            </div>
            <a class="btn" target="_blank" href="https://github.com/HwyNe/PitoCtf-Writeups">GitHub</a>
        </div>
    </header>

    <div class="container">

        <div id="mainView">
            <div class="search-box">
                <input id="searchInput" placeholder="Writeup ara...">
            </div>

            <div class="filter-buttons" id="filterButtons"></div>

            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalWriteups">0</div>
                    <div>Toplam Writeup</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalCategories">0</div>
                    <div>Kategori</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="filteredResults">0</div>
                    <div>Sonuç</div>
                </div>
            </div>

            <div class="writeups-grid" id="writeupsGrid"></div>
        </div>

        <div id="detailView" class="detail-view">
            <button class="btn" onclick="goBack()">← Geri</button>
            <article class="detail-article">
                <span class="category-badge" id="detailCategory"></span>
                <h1 id="detailTitle"></h1>
                <a id="detailGithub" target="_blank">GitHub’da Gör</a>
                <pre><code id="detailContent"></code></pre>
            </article>
        </div>

    </div>

    <footer class="footer">
        PitoCtf Writeups • Otomatik kategori sistemi
    </footer>

    <script>
        const REPO = "HwyNe/PitoCtf-Writeups";
        let allWriteups = [];
        let currentFilter = "all";
        let searchTerm = "";

        async function fetchWriteups() {
            const root = await fetch(`https://api.github.com/repos/${REPO}/contents`);
            const items = await root.json();

            const folders = items.filter(i => i.type === "dir");

            for (const folder of folders) {
                const res = await fetch(folder.url);
                const files = await res.json();

                for (const f of files) {
                    if (!f.name.endsWith(".md")) continue;

                    const content = await fetch(f.download_url).then(r => r.text());
                    allWriteups.push({
                        title: f.name.replace(".md", ""),
                        category: folder.name,
                        content,
                        url: f.html_url
                    });
                }
            }

            renderFilters();
            renderWriteups();
            updateStats();
        }

        function renderFilters() {
            filterButtons.innerHTML = "";
            const cats = ["all", ...new Set(allWriteups.map(w => w.category))];

            cats.forEach(c => {
                const b = document.createElement("button");
                b.className = "filter-btn" + (c === currentFilter ? " active" : "");
                b.textContent = c === "all" ? "Tümü" : c;
                b.onclick = () => {
                    currentFilter = c;
                    renderFilters();
                    renderWriteups();
                };
                filterButtons.appendChild(b);
            });
        }

        function renderWriteups() {
            writeupsGrid.innerHTML = "";
            const list = allWriteups.filter(w =>
                (currentFilter === "all" || w.category === currentFilter) &&
                (w.title.toLowerCase().includes(searchTerm) || w.content.toLowerCase().includes(searchTerm))
            );

            filteredResults.textContent = list.length;

            list.forEach(w => {
                const d = document.createElement("div");
                d.className = "writeup-card";
                d.innerHTML = `
            <span class="category-badge">${w.category}</span>
            <h3>${w.title}</h3>
            <p>${w.content.slice(0,100)}...</p>
        `;
                d.onclick = () => showDetail(w);
                writeupsGrid.appendChild(d);
            });
        }

        function showDetail(w) {
            mainView.style.display = "none";
            detailView.classList.add("active");
            detailTitle.textContent = w.title;
            detailCategory.textContent = w.category;
            detailGithub.href = w.url;
            detailContent.textContent = w.content;
        }

        function goBack() {
            detailView.classList.remove("active");
            mainView.style.display = "block";
        }

        searchInput.oninput = e => {
            searchTerm = e.target.value.toLowerCase();
            renderWriteups();
        };

        function updateStats() {
            totalWriteups.textContent = allWriteups.length;
            totalCategories.textContent = new Set(allWriteups.map(w => w.category)).size;
        }

        fetchWriteups();
    </script>

</body>

</html>
